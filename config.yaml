# GMO Positive Control Characterization Pipeline - Configuration
# Each sample needs: name, host reference, construct reference, and reads

pipeline:
  threads: 8
  memory_gb: 32
  # Always-on supplementary FASTA of common transgene payload genes
  # (bar, nptII, hpt, gusA, gfp, ...). Passed to step 5 as a second
  # element DB alongside the per-sample construct reference.
  common_payload_db: element_db/common_payload.fa
  # Use SLURM job submission (false = run locally)
  use_slurm: false
  slurm:
    partition: cpu-s2-core-0
    account: cpu-s5-bch709-0
    time: "4:00:00"

# Reference databases
references:
  # Element database for construct identification
  element_db: element_db/gmo_combined_db.fa

# T6 (v1.0 MVP): thresholds consumed by scripts/s05/verdict.compute_verdict
# via scripts/s05/config_loader.load_verdict_rules. Keys mirror the compiled
# defaults in s05_insert_assembly.py; omitting the section keeps legacy
# behaviour unchanged.
verdict_rules:
  cand_host_fraction_max: 0.80
  cand_largest_gap_min: 500
  fp_host_fraction_min: 0.80
  fp_largest_gap_max: 500
  fp_off_target_chrs_min: 2
  fp_combined_frac_min: 0.85
  fp_construct_frac_min: 0.25
  unknown_to_fp_host_fraction_min: 0.85
  unknown_to_fp_construct_frac_max: 0.05
  canonical_triplet_min_identity: 0.90

# Per-sample canonical element triplets for the CANDIDATE promotion rule.
# `default` applies when the sample has no dedicated entry.
canonical_triplets:
  default: [bar, P-CaMV35S, T-ocs]
  rice_G281: [hLF1, P-Gt1, T-nos]
  soybean_AtYUCCA6: [bar, P-CaMV35S, T-ocs]
  soybean_UGT72E3: [bar, P-CaMV35S, T-nos]
  tomato_Cas9_A2_3: [bar, SpCas9, sgRNA_scaffold_generic]

